<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Produit</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h2 th:text="${produit.id == null} ? 'Nouveau Produit' : 'Modifier le Produit'">Titre</h2>

    <form th:action="@{/produits/save}" th:object="${produit}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label>Nom :</label>
        <input type="text" th:field="*{nom}" required />

        <label>Catégorie :</label>
        <input type="text" th:field="*{categorie}" />

        <label>Prix :</label>
        <input type="number" step="0.01" th:field="*{prix}" required />

        <label>Quantité :</label>
        <input type="number" th:field="*{quantite}" required />

        <label>Fournisseur :</label>
        <select th:field="*{fournisseur.id}" required>
            <option value="">-- Sélectionnez un fournisseur --</option>
            <option th:each="f : ${fournisseurs}"
                    th:value="${f.id}"
                    th:text="${f.nom}">
            </option>
        </select>

        <div class="actions">
            <button type="submit">Enregistrer</button>
            <a href="/produits">Annuler</a>
        </div>
    </form>
</div>

</body>
</html>
